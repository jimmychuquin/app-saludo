name: Deploy Saludo FFAA

on:
  push:
    branches: ["main"]
    paths:
      - "backend-saludo/**"
      - "frontend-saludo/**"
      - ".github/workflows/deploy-saludo.yml"
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Forzar build/deploy de backend"
        required: false
        default: false
        type: boolean
      force_frontend:
        description: "Forzar build/deploy de frontend"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_REPO_NAME: ${{ secrets.IMAGE_REPO_NAME }}
  BACKEND_TAG_LATEST: backend-latest
  FRONTEND_TAG_LATEST: frontend-latest
  BACKEND_SHA_PREFIX: backend-sha-
  FRONTEND_SHA_PREFIX: frontend-sha-
  KEEP_SHA_TAGS: "1"
  #DEPLOY_NETWORK: internal   # o internal, según tu compose

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.select.outputs.backend }}
      frontend: ${{ steps.select.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend-saludo/**'
            frontend:
              - 'frontend-saludo/**'
      - name: Resolve effective targets
        id: select
        run: |
          backend="${{ steps.filter.outputs.backend }}"
          frontend="${{ steps.filter.outputs.frontend }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_backend }}" = "true" ]; then backend="true"; fi
            if [ "${{ inputs.force_frontend }}" = "true" ]; then frontend="true"; fi
          fi
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-saludo
          file: ./backend-saludo/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.BACKEND_TAG_LATEST }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.BACKEND_SHA_PREFIX }}${{ github.sha }}
      - name: Cleanup old backend SHA tags
        run: # igual que antes pero con el prefijo backend-sha-

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-saludo
          file: ./frontend-saludo/Dockerfile
          build-args: |
            BASE_HREF=/saludo/
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.FRONTEND_TAG_LATEST }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.FRONTEND_SHA_PREFIX }}${{ github.sha }}
      - name: Cleanup old frontend SHA tags
        run: # similar

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /srv/platform/compose
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            # Actualizar imágenes (solo las que se construyeron)
            if [ "${{ needs.build-backend.result }}" = "success" ]; then
              docker compose pull backend-saludo
            fi
            if [ "${{ needs.build-frontend.result }}" = "success" ]; then
              docker compose pull frontend-saludo
            fi
            # Recrear servicios (solo si sus imágenes cambiaron)
            docker compose up -d --force-recreate backend-saludo frontend-saludo
            docker system prune -f