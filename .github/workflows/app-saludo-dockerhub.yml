name: App-Saludo Docker Build and Push

on:
  push:
    branches: ["main", "desarrollo"]
    paths:
      - "backend-saludo/**"
      - "frontend-saludo/**"
      - ".github/workflows/app-saludo-dockerhub.yml"
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Forzar build/deploy de backend"
        required: false
        default: false
        type: boolean
      force_frontend:
        description: "Forzar build/deploy de frontend"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_REPO_NAME: ${{ secrets.IMAGE_REPO_NAME }}
  BACKEND_TAG_LATEST: backend-latest
  FRONTEND_TAG_LATEST: frontend-latest
  BACKEND_SHA_PREFIX: backend-sha-
  FRONTEND_SHA_PREFIX: frontend-sha-
  KEEP_SHA_TAGS: "3"
  DEPLOY_COMPOSE_FILE: /srv/platform/infra/compose/docker-compose.yml
  DEPLOY_NETWORK: compose_app_net
  DEPLOY_BACKEND_SERVICE: backend-saludo
  DEPLOY_FRONTEND_SERVICE: frontend-saludo
  EUREKA_ENABLED: "true"
  EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.select.outputs.backend }}
      frontend: ${{ steps.select.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend-saludo/**'
            frontend:
              - 'frontend-saludo/**'

      - name: Resolve effective targets
        id: select
        run: |
          backend="${{ steps.filter.outputs.backend }}"
          frontend="${{ steps.filter.outputs.frontend }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_backend }}" = "true" ]; then
            backend="true"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_frontend }}" = "true" ]; then
            frontend="true"
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-saludo
          file: ./backend-saludo/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.BACKEND_TAG_LATEST }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.BACKEND_SHA_PREFIX }}${{ github.sha }}

      - name: Keep only latest 3 backend SHA tags in Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKER_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
          REPO_NAME: ${{ env.IMAGE_REPO_NAME }}
          TAG_PREFIX: ${{ env.BACKEND_SHA_PREFIX }}
          KEEP_SHA_TAGS: ${{ env.KEEP_SHA_TAGS }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime

          user = os.environ['DH_USER']
          token = os.environ['DH_TOKEN']
          repo = os.environ['REPO_NAME']
          keep = int(os.environ.get('KEEP_SHA_TAGS', '3'))
          tag_prefix = os.environ.get('TAG_PREFIX', 'sha-')

          login_req = urllib.request.Request(
              'https://hub.docker.com/v2/users/login/',
              data=json.dumps({'username': user, 'password': token}).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(login_req) as resp:
              jwt = json.loads(resp.read().decode('utf-8'))['token']

          headers = {'Authorization': f'JWT {jwt}'}
          tags = []
          url = f'https://hub.docker.com/v2/namespaces/{user}/repositories/{repo}/tags?page_size=100'

          while url:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
              tags.extend(data.get('results', []))
              url = data.get('next')

          sha_tags = []
          for t in tags:
              name = t.get('name', '')
              if name.startswith(tag_prefix):
                  pushed = t.get('tag_last_pushed')
                  try:
                      dt = datetime.fromisoformat(pushed.replace('Z', '+00:00'))
                  except Exception:
                      dt = datetime.min
                  sha_tags.append((name, dt))

          sha_tags.sort(key=lambda x: x[1], reverse=True)
          to_delete = sha_tags[keep:]

          for name, _ in to_delete:
              del_url = f'https://hub.docker.com/v2/namespaces/{user}/repositories/{repo}/tags/{name}/'
              del_req = urllib.request.Request(del_url, headers=headers, method='DELETE')
              try:
                  urllib.request.urlopen(del_req)
                  print(f'Deleted old tag: {repo}:{name}')
              except Exception as e:
                  print(f'Could not delete {repo}:{name} -> {e}')

          print(f'Total SHA tags: {len(sha_tags)} | kept: {min(keep, len(sha_tags))} | deleted: {max(0, len(sha_tags)-keep)}')
          PY

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-saludo
          file: ./frontend-saludo/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.FRONTEND_TAG_LATEST }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_REPO_NAME }}:${{ env.FRONTEND_SHA_PREFIX }}${{ github.sha }}

      - name: Keep only latest 3 frontend SHA tags in Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKER_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKER_PASSWORD }}
          REPO_NAME: ${{ env.IMAGE_REPO_NAME }}
          TAG_PREFIX: ${{ env.FRONTEND_SHA_PREFIX }}
          KEEP_SHA_TAGS: ${{ env.KEEP_SHA_TAGS }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime

          user = os.environ['DH_USER']
          token = os.environ['DH_TOKEN']
          repo = os.environ['REPO_NAME']
          keep = int(os.environ.get('KEEP_SHA_TAGS', '3'))
          tag_prefix = os.environ.get('TAG_PREFIX', 'sha-')

          login_req = urllib.request.Request(
              'https://hub.docker.com/v2/users/login/',
              data=json.dumps({'username': user, 'password': token}).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(login_req) as resp:
              jwt = json.loads(resp.read().decode('utf-8'))['token']

          headers = {'Authorization': f'JWT {jwt}'}
          tags = []
          url = f'https://hub.docker.com/v2/namespaces/{user}/repositories/{repo}/tags?page_size=100'

          while url:
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
              tags.extend(data.get('results', []))
              url = data.get('next')

          sha_tags = []
          for t in tags:
              name = t.get('name', '')
              if name.startswith(tag_prefix):
                  pushed = t.get('tag_last_pushed')
                  try:
                      dt = datetime.fromisoformat(pushed.replace('Z', '+00:00'))
                  except Exception:
                      dt = datetime.min
                  sha_tags.append((name, dt))

          sha_tags.sort(key=lambda x: x[1], reverse=True)
          to_delete = sha_tags[keep:]

          for name, _ in to_delete:
              del_url = f'https://hub.docker.com/v2/namespaces/{user}/repositories/{repo}/tags/{name}/'
              del_req = urllib.request.Request(del_url, headers=headers, method='DELETE')
              try:
                  urllib.request.urlopen(del_req)
                  print(f'Deleted old tag: {repo}:{name}')
              except Exception as e:
                  print(f'Could not delete {repo}:{name} -> {e}')

          print(f'Total SHA tags: {len(sha_tags)} | kept: {min(keep, len(sha_tags))} | deleted: {max(0, len(sha_tags)-keep)}')
          PY

  deploy-backend:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,IMAGE_REPO_NAME,BACKEND_TAG_LATEST,DEPLOY_BACKEND_SERVICE,DEPLOY_NETWORK,EUREKA_ENABLED,EUREKA_DEFAULT_ZONE
          script: |
            set -e
            IMAGE="$DOCKER_USERNAME/$IMAGE_REPO_NAME:$BACKEND_TAG_LATEST"
            docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
            docker pull "$IMAGE"

            NETWORK_NAME=""
            if docker ps -a --format '{{.Names}}' | grep -qx "$DEPLOY_BACKEND_SERVICE"; then
              NETWORK_NAME=$(docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{printf "%s\n" $k}}{{end}}' "$DEPLOY_BACKEND_SERVICE" | head -n 1)
            elif docker network ls --format '{{.Name}}' | grep -qx "$DEPLOY_NETWORK"; then
              NETWORK_NAME="$DEPLOY_NETWORK"
            fi

            if [ -z "$NETWORK_NAME" ]; then
              echo "No se encontro red para desplegar '$DEPLOY_BACKEND_SERVICE'. Define DEPLOY_NETWORK correctamente en workflow."
              exit 1
            fi

            if docker ps -a --format '{{.Names}}' | grep -qx "$DEPLOY_BACKEND_SERVICE"; then
              docker rm -f "$DEPLOY_BACKEND_SERVICE"
            fi

            docker run -d --name "$DEPLOY_BACKEND_SERVICE" --network "$NETWORK_NAME" --restart unless-stopped -e EUREKA_ENABLED="$EUREKA_ENABLED" -e EUREKA_DEFAULT_ZONE="$EUREKA_DEFAULT_ZONE" "$IMAGE"

            docker ps --filter "name=$DEPLOY_BACKEND_SERVICE"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          EUREKA_ENABLED: ${{ env.EUREKA_ENABLED }}
          EUREKA_DEFAULT_ZONE: ${{ env.EUREKA_DEFAULT_ZONE }}

  deploy-frontend:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,IMAGE_REPO_NAME,FRONTEND_TAG_LATEST,DEPLOY_FRONTEND_SERVICE,DEPLOY_NETWORK
          script: |
            set -e
            IMAGE="$DOCKER_USERNAME/$IMAGE_REPO_NAME:$FRONTEND_TAG_LATEST"
            docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
            docker pull "$IMAGE"

            NETWORK_NAME=""
            if docker ps -a --format '{{.Names}}' | grep -qx "$DEPLOY_FRONTEND_SERVICE"; then
              NETWORK_NAME=$(docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{printf "%s\n" $k}}{{end}}' "$DEPLOY_FRONTEND_SERVICE" | head -n 1)
            elif docker network ls --format '{{.Name}}' | grep -qx "$DEPLOY_NETWORK"; then
              NETWORK_NAME="$DEPLOY_NETWORK"
            fi

            if [ -z "$NETWORK_NAME" ]; then
              echo "No se encontro red para desplegar '$DEPLOY_FRONTEND_SERVICE'. Define DEPLOY_NETWORK correctamente en workflow."
              exit 1
            fi

            if docker ps -a --format '{{.Names}}' | grep -qx "$DEPLOY_FRONTEND_SERVICE"; then
              docker rm -f "$DEPLOY_FRONTEND_SERVICE"
            fi

            docker run -d --name "$DEPLOY_FRONTEND_SERVICE" --network "$NETWORK_NAME" --restart unless-stopped "$IMAGE"

            docker ps --filter "name=$DEPLOY_FRONTEND_SERVICE"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
